<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Change Password — Daladala Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- ADMIN NAVIGATION -->
<nav class="navbar navbar-admin">
    <div class="container">
        <a class="nav-brand" th:href="@{/admin/dashboard}">
            <span class="nav-brand-icon nav-brand-icon-admin">A</span>
            Admin Panel
        </a>
        <div class="nav-links">
            <a th:href="@{/admin/dashboard}">Dashboard</a>
            <a th:href="@{/admin/change-password}" class="active">Change Password</a>
            <a th:href="@{/}" style="color:#93c5fd;">Passenger View</a>
            <a th:href="@{/admin/logout}" style="color:#fca5a5; margin-left:4px;">Logout</a>
        </div>
    </div>
</nav>

<!-- PAGE BANNER -->
<div class="page-banner">
    <div class="container">
        <div class="page-banner-inner">
            <div>
                <h1>Change Password</h1>
                <div class="breadcrumb">
                    <a th:href="@{/admin/dashboard}">Dashboard</a>
                    <span class="breadcrumb-sep">/</span>
                    <span>Change Password</span>
                </div>
            </div>
            <a th:href="@{/admin/dashboard}" class="btn btn-light btn-sm">&larr; Back to Dashboard</a>
        </div>
    </div>
</div>

<div class="container page-content">
    <div class="card" style="max-width:460px; margin:0 auto;">

        <h2 class="card-title">Update Your Password</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}">Error</div>

        <form th:action="@{/admin/change-password}" method="post">

            <div class="form-group">
                <label for="oldPassword">Current Password</label>
                <input type="password"
                       id="oldPassword"
                       name="oldPassword"
                       class="form-control"
                       placeholder="Enter your current password"
                       required
                       autofocus>
            </div>

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password"
                       id="newPassword"
                       name="newPassword"
                       class="form-control"
                       placeholder="At least 4 characters"
                       required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password"
                       id="confirmPassword"
                       name="confirmPassword"
                       class="form-control"
                       placeholder="Re-enter new password"
                       required>
            </div>

            <div style="display:flex; gap:12px; padding-top:8px;">
                <button type="submit" class="btn btn-primary">Update Password</button>
                <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Cancel</a>
            </div>

        </form>
    </div>
</div>

<footer class="footer">
    <div class="footer-inner">
        <span>Daladala Admin Panel &mdash; Dar es Salaam, Tanzania</span>
        <a th:href="@{/admin/logout}">Logout</a>
    </div>
</footer>

</body>
</html>
