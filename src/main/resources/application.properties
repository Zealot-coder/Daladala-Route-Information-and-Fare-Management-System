# ==========================================
# Server
# ==========================================
server.port=8080

# ==========================================
# MySQL Database
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/daladala_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Dar_es_Salaam
spring.datasource.username=root
spring.datasource.password=0909
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# Thymeleaf (disable cache for development)
# ==========================================
spring.thymeleaf.cache=false

# ==========================================
# Application name
# ==========================================
spring.application.name=daladala-system
